sonar.projectKey=ai-feature-showcase
sonar.projectName=AI Feature Showcase
sonar.projectVersion=1.0

sonar.sources=.
sonar.tests=.
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts,**/*.spec.tsx,**/*.test.tsx

sonar.exclusions=\
  **/node_modules/**,\
  **/.next/**,\
  **/generated/**,\
  **/.vscode/**,\
  **/public/**,\
  **/.claude/**,\
  **/scripts/**,\
  **/dist/**,\
  **/build/**,\
  **/coverage/**,\
  **/*.json,\
  **/*.md,\
  **/*.config.js,\
  **/*.config.ts,\
  **/*.tsbuildinfo,\
  app/globals.css,\
  **/*.css

sonar.coverage.exclusions=\
  **/*.spec.ts,\
  **/*.test.ts,\
  **/*.spec.tsx,\
  **/*.test.tsx,\
  **/*.d.ts,\
  **/*.type.ts

sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.sourceEncoding=UTF-8
sonar.language=ts
sonar.typescript.node=node_modules

sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300
