services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: ai-showcase-dev
    ports:
      - "3011:3011"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3009}
      - NEXT_PUBLIC_APP_NAME=${NEXT_PUBLIC_APP_NAME:-"AI Feature Showcase"}
      - NEXT_PUBLIC_AUTH_ENABLED=${NEXT_PUBLIC_AUTH_ENABLED:-false}
    command: yarn dev
