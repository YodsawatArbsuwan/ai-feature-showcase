services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: showcase-frontend-dev
    ports:
      - "3011:3011"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
    command: yarn dev
